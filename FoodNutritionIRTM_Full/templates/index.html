
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Food Nutrition IR System</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
<h1>🍎 Food Nutrition Information Retrieval System</h1>
<div class="bar">
<input id="q" placeholder="Search food like banana, tea, rice">
<button onclick="searchFood()">Search</button>
<button onclick="weightLoss()">Weight Loss</button>
<button onclick="weightGain()">Weight Gain</button>
</div>
<div id="results"></div>
</div>
<script>
const results=document.getElementById('results');

function card(item){
 return `<div class="card">
 <h3>${item["Dish Name"]}</h3>
 <p>Calories: ${item["Calories (kcal)"] ?? ""}</p>
 <p>Protein: ${item["Protein (g)"] ?? ""}</p>
 ${item.score !== undefined ? `<p>Similarity Score: ${item.score}</p>` : ""}
 ${item.id !== undefined ? `<button onclick="viewDetails(${item.id})">View Details</button>` : ""}
 </div>`;
}

function searchFood(){
 fetch('/search',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'query='+encodeURIComponent(q.value)})
 .then(r=>r.json()).then(data=>{
   results.innerHTML = data.map(card).join('') || "<p>No results found</p>";
 });
}

function viewDetails(id){
 fetch('/details/'+id).then(r=>r.json()).then(item=>{
   results.innerHTML = `<div class="card big">
   <h2>${item["Dish Name"]}</h2>
   <p>Calories: ${item["Calories (kcal)"] ?? ""}</p>
   <p>Protein: ${item["Protein (g)"] ?? ""}</p>
   <p>Fats: ${item["Fats (g)"] ?? ""}</p>
   <p>Carbs: ${item["Carbohydrates (g)"] ?? ""}</p>
   <p>Fiber: ${item["Fiber (g)"] ?? ""}</p>
   <p>Sugars: ${item["Sugars (g)"] ?? ""}</p>
   <button onclick="history.back()">Back</button>
   </div>`;
 });
}

function weightLoss(){
 fetch('/weightloss').then(r=>r.json()).then(data=>{
   results.innerHTML = "<h2>Weight Loss Suggestions</h2>"+data.map(card).join('');
 });
}
function weightGain(){
 fetch('/weightgain').then(r=>r.json()).then(data=>{
   results.innerHTML = "<h2>Weight Gain Suggestions</h2>"+data.map(card).join('');
 });
}
</script>
</body></html>
